
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cinematic Edition - Proposal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  padding:40px 0;
  background:#e5e5e5;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'Inter',sans-serif;
}

.pdf-page{
  width:794px;
  height:1123px;
  background:#ffffff;
  color:#111111;
  margin-bottom:40px;
  padding:80px 70px 120px 70px;
  box-sizing:border-box;
  position:relative;
  overflow:hidden;
}

.page-content{
  display:flex;
  flex-direction:column;
}

.page-footer{
  position:absolute;
  bottom:40px;
  left:70px;
  right:70px;
  text-align:center;
  font-size:11px;
  color:#9ca3af;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:42px;
  margin:20px 0;
}

.section-title{
  font-size:12px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:#6b7280;
  margin-top:20px;
  margin-bottom:25px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  font-size:11px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:#9ca3af;
  padding-bottom:15px;
  border-bottom:1px solid #e5e7eb;
  text-align:left;
}

td{
  padding:25px 0;
  border-bottom:1px solid #e5e7eb;
  font-size:14px;
}
</style>
</head>
<body>

<div class="pdf-page">
  <div class="page-content">
    <h1>Produção Cinematográfica & Estratégia Social</h1>

    <div style="margin-top:40px;">
      <strong>Cliente:</strong> Nome do Cliente<br><br>
      <strong>Data:</strong> Março 2026
    </div>
  </div>

  <div class="page-footer">
    Documento Executivo • Página 1
  </div>
</div>

<div class="pdf-page">
  <div class="page-content">
    <div class="section-title">Investimento</div>

    <table>
      <thead>
        <tr>
          <th>Entrega</th>
          <th style="text-align:right;">Valor</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Filme Institucional 4K</td>
          <td style="text-align:right;">R$ 18.000,00</td>
        </tr>
        <tr>
          <td>Pacote Conteúdo Social Premium</td>
          <td style="text-align:right;">R$ 7.500,00</td>
        </tr>
      </tbody>
    </table>

    <div style="margin-top:50px; border:1px solid #111; padding:30px;">
      <span style="font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#6b7280;">
        Investimento Total
      </span>
      <h2 style="margin-top:15px;">R$ 25.500,00</h2>
    </div>
  </div>

  <div class="page-footer">
    Documento Executivo • Página 2
  </div>
</div>

</body>
</html>
